name: Step Motor Test Pipeline

on: [push]

jobs:
  analyze_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Cppcheck and Python
        # MISRA eklentisi Python altyapısını kullandığı için python3'ü de kuruyoruz
        run: sudo apt-get update && sudo apt-get install -y cppcheck python3

      - name: Run MISRA C Compliance Check
        # --addon=misra parametresi ile MISRA standartlarını devreye sokuyoruz
        run: cppcheck --addon=misra --enable=all --suppress=missingIncludeSystem --error-exitcode=1 .
